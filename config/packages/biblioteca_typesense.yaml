biblioteca_typesense:
  typesense:
    uri: '%env(resolve:TYPESENSE_URL)%'
    key: '%env(resolve:TYPESENSE_KEY)%'
  collections:
    books:
      name: 'books'
      entity: 'App\Entity\Book'
      mapping:
        fields:
          title:
            name: title
            type: string
          sortable_id:
            entity_attribute: id
            name: sortable_id
            type: int32
          serie:
            name: serie
            type: string
            optional: true
            facet: true
          summary:
            name: summary
            type: string
            optional: true
          serieIndex:
            name: serieIndex
            type: string
            optional: true
          extension:
            name: extension
            type: string
            facet: true
          authors:
            name: authors
            type: string[]
            facet: true
          tags:
            name: tags
            type: string[]
            facet: true
            optional: true
        default_sorting_field: sortable_id
        symbols_to_index: ['+', '#', '@', '_']
        token_separators: [' ', '-', "'"]
